<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Concentrix VIP Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #005a7d; --bg: #f8fafc; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--main); font-family: sans-serif; overflow: hidden; }
        .view { display: none; width: 100%; height: 100vh; position: absolute; top: 0; left: 0; background: var(--bg); overflow-y: auto; }
        .view.active { display: block; z-index: 50; }
        .input-box { width: 100%; padding: 15px; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 12px; outline: none; margin-bottom: 10px; }
        .btn-main { width: 100%; padding: 16px; background: var(--main); color: white; border-radius: 12px; font-weight: bold; text-align: center; display: block; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: none; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; z-index: 100; }
        .nav-item { color: #94a3b8; text-align: center; font-size: 10px; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--main); font-weight: bold; }
        .record-card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; border-bottom: 2px dashed #eee; }
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; background: white; padding: 15px 20px; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); display: none; width: 85%; border-left: 5px solid #14b8a6; }
    </style>
</head>
<body>

    <div id="toast" class="toast"></div>

    <div id="register-view" class="view active flex flex-col bg-[#005a7d]
